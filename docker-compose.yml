# A 3-node book-service cluster over the real HTTP transport, plus a Prometheus +
# Grafana observability stack. Each node is one process (one container); peers
# reach each other by the compose service DNS name (node1/node2/node3).
#
#   docker compose up --build
#
# Then: API on http://localhost:3001 (and :3002, :3003), Prometheus on :9090,
# Grafana on :3000 (admin/admin). See docs/OPERATIONS.md.

services:
  node1:
    build: .
    environment:
      NODE_ID: node1
      PORT: "3001"
      # PEERS lists the OTHER two nodes (self is excluded) as "id@url" CSV,
      # using compose service DNS names so containers can reach each other.
      PEERS: "node2@http://node2:3002,node3@http://node3:3003"
      # ADVERTISE_URL is how peers reach THIS node (the membership-config address).
      ADVERTISE_URL: "http://node1:3001"
      DATA_DIR: /app/data
      LOG_FORMAT: json
    ports:
      - "3001:3001"
    volumes:
      - node1-data:/app/data
    healthcheck:
      # /ready returns 200 once this node recognises a leader (safe to route writes).
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  node2:
    build: .
    environment:
      NODE_ID: node2
      PORT: "3002"
      PEERS: "node1@http://node1:3001,node3@http://node3:3003"
      ADVERTISE_URL: "http://node2:3002"
      DATA_DIR: /app/data
      LOG_FORMAT: json
    ports:
      - "3002:3002"
    volumes:
      - node2-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  node3:
    build: .
    environment:
      NODE_ID: node3
      PORT: "3003"
      PEERS: "node1@http://node1:3001,node2@http://node2:3002"
      ADVERTISE_URL: "http://node3:3003"
      DATA_DIR: /app/data
      LOG_FORMAT: json
    ports:
      - "3003:3003"
    volumes:
      - node3-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - node1
      - node2
      - node3

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  node1-data:
  node2-data:
  node3-data:
  prometheus-data:
  grafana-data:
